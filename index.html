<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predição de Clique Anúncios</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #191919; --surface2: #222222;
    --border: #2e2e2e; --accent: #c8a96e; --accent2: #e8c98e;
    --text: #f0ede8; --muted: #888; --green: #4caf7d; --red: #e05c5c;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(ellipse 80% 60% at 70% 20%, rgba(200,169,110,0.06) 0%, transparent 60%); pointer-events: none; z-index: 0; }
  header { position: relative; z-index: 1; padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--accent); }
  .status-dot { display: flex; align-items: center; gap: 7px; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  main { position: relative; z-index: 1; flex: 1; display: flex; gap: 2rem; max-width: 1000px; margin: 0 auto; padding: 1.5rem 2rem; width: 100%; align-items: flex-start; }
  .left { flex: 1; display: flex; flex-direction: column; gap: 1rem; }
  .hero h1 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; line-height: 1.2; margin-bottom: 0.3rem; }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero p { font-size: 0.82rem; color: var(--muted); line-height: 1.6; max-width: 380px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .card-header { padding: 0.9rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-header span { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .form-grid { padding: 1.25rem; display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.full { grid-column: 1 / -1; }
  label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); }
  input, select { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 300; padding: 8px 12px; width: 100%; transition: border-color 0.2s; -webkit-appearance: none; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  select option { background: #1e1e1e; }
  .card-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
  .btn-predict { background: var(--accent); border: none; border-radius: 7px; color: #0f0f0f; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.04em; padding: 10px 24px; width: 100%; transition: all 0.2s; }
  .btn-predict:hover { background: var(--accent2); }
  .btn-predict:disabled { opacity: 0.5; cursor: not-allowed; }
  .right { width: 280px; flex-shrink: 0; display: flex; flex-direction: column; gap: 1rem; padding-top: 3.2rem; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; opacity: 0; transform: translateY(10px); transition: all 0.35s ease; pointer-events: none; }
  .result-card.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .result-label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.4rem; }
  .result-verdict { font-family: 'DM Serif Display', serif; font-size: 1.8rem; line-height: 1.2; margin-bottom: 0.3rem; }
  .result-verdict.alto { color: var(--green); }
  .result-verdict.baixo { color: var(--red); }
  .result-sub { font-size: 0.75rem; color: var(--muted); }
  .divider { height: 1px; background: var(--border); margin: 1rem 0; }
  .prob-bar-wrap { margin-bottom: 0.75rem; }
  .prob-label-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .prob-label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .prob-val { font-size: 0.75rem; color: var(--text); }
  .bar-bg { height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
  .bar-fill.green { background: var(--green); }
  .bar-fill.red { background: var(--red); }
  .meta-grid { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.5rem; }
  .meta-item { display: flex; justify-content: space-between; align-items: baseline; }
  .meta-label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .meta-value { font-size: 0.82rem; color: var(--text); }
  .error-msg { background: rgba(224,92,92,0.08); border: 1px solid rgba(224,92,92,0.2); border-radius: 8px; color: var(--red); font-size: 0.8rem; padding: 10px 14px; display: none; }
  .error-msg.visible { display: block; }
  footer { position: relative; z-index: 1; padding: 1rem 2rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; flex-shrink: 0; }
  footer span { font-size: 0.72rem; color: var(--muted); }
  footer a { color: var(--accent); text-decoration: none; font-size: 0.72rem; }
  @media (max-width: 700px) { main { flex-direction: column; } .right { width: 100%; padding-top: 0; } }
</style>
</head>
<body>

<header>
  <div class="logo">Predição de Cliques</div>
  <div class="status-dot"><div class="dot"></div><span></span></div>
</header>

<main>
  <div class="left">
    <div class="hero">
      <h1>Predição de <em>cliques</em> em anúncios</h1>
      <p>Regressão Logística treinada com 1.000 usuários ~90% de acurácia.</p>
    </div>

    <div class="card">
      <div class="card-header">
        <span>Perfil do usuário</span>
      </div>
      <div class="form-grid">
        <div class="field">
          <label>Tempo no site/dia (min)</label>
          <input type="number" id="time_site" value="50" step="0.1" min="0">
        </div>
        <div class="field">
          <label>Uso de internet/dia (min)</label>
          <input type="number" id="internet_usage" value="180" step="0.1" min="0">
        </div>
        <div class="field">
          <label>Idade</label>
          <input type="number" id="age" value="35" min="18" max="100">
        </div>
        <div class="field">
          <label>Renda regional (USD)</label>
          <input type="number" id="income" value="55000" step="100" min="0">
        </div>
        <div class="field full">
          <label>Sexo</label>
          <select id="male">
            <option value="0">Feminino</option>
            <option value="1">Masculino</option>
          </select>
        </div>
      </div>
      <div class="card-footer">
        <button class="btn-predict" id="btn" onclick="predict()">Prever probabilidade de clique</button>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="result-card" id="result">
      <div class="result-label">Resultado da análise</div>
      <div class="result-verdict" id="verdict">—</div>
      <div class="result-sub" id="result-sub">—</div>
      <div class="divider"></div>
      <div class="prob-bar-wrap">
        <div class="prob-label-row">
          <span class="prob-label">Prob. de clique</span>
          <span class="prob-val" id="prob-click">—</span>
        </div>
        <div class="bar-bg"><div class="bar-fill green" id="bar-click" style="width:0%"></div></div>
      </div>
      <div class="prob-bar-wrap">
        <div class="prob-label-row">
          <span class="prob-label">Prob. sem clique</span>
          <span class="prob-val" id="prob-no">—</span>
        </div>
        <div class="bar-bg"><div class="bar-fill red" id="bar-no" style="width:0%"></div></div>
      </div>
      <div class="meta-grid">
        <div class="meta-item"><span class="meta-label">Modelo</span><span class="meta-value">Reg. Logística</span></div>
        <div class="meta-item"><span class="meta-label">Acurácia</span><span class="meta-value">~90%</span></div>
        <div class="meta-item"><span class="meta-label">Idade</span><span class="meta-value" id="age-display">—</span></div>
      </div>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>
</main>

<footer>
  <span>Desenvolvido por <a href="https://github.com/Anderson1999DC" target="_blank">Anderson Coelho</a></span>
  <a href="https://github.com/Anderson1999DC/Regressao-logistica-para-predicao-de-cliques" target="_blank">GitHub →</a>
</footer>

<script>
  async function predict() {
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');
    const errorMsg = document.getElementById('error-msg');

    btn.disabled = true;
    btn.textContent = 'Analisando...';
    result.classList.remove('visible');
    errorMsg.classList.remove('visible');

    const payload = {
      daily_time_spent_on_site: parseFloat(document.getElementById('time_site').value) || 50,
      age: parseInt(document.getElementById('age').value) || 35,
      area_income: parseFloat(document.getElementById('income').value) || 55000,
      daily_internet_usage: parseFloat(document.getElementById('internet_usage').value) || 180,
      male: parseInt(document.getElementById('male').value)
    };

    try {
      const res = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('Erro na API');
      const data = await res.json();

      const alto = data.clicou === 1;
      const probClick = Math.round(data.probabilidade_clique * 100);
      const probNo = Math.round(data.probabilidade_nao_clique * 100);

      document.getElementById('verdict').textContent = alto ? 'Alta propensão' : 'Baixa propensão';
      document.getElementById('verdict').className = 'result-verdict ' + (alto ? 'alto' : 'baixo');
      document.getElementById('result-sub').textContent = data.resultado;
      document.getElementById('prob-click').textContent = probClick + '%';
      document.getElementById('prob-no').textContent = probNo + '%';
      document.getElementById('bar-click').style.width = probClick + '%';
      document.getElementById('bar-no').style.width = probNo + '%';
      document.getElementById('age-display').textContent = payload.age + ' anos';
      result.classList.add('visible');
    } catch (err) {
      errorMsg.textContent = 'Erro ao conectar com a API. Tente novamente.';
      errorMsg.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Prever probabilidade de clique';
    }
  }
</script>
</body>
</html>
